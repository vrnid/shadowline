<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW LINE - 语音和文本聊天</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 to-black flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transform transition-all">
        <h1 class="text-3xl font-extrabold text-gray-800 mb-6">SHADOW LINE</h1>

        <div class="mb-6">
            <input type="text" id="roomIdInput" placeholder="输入房间ID" 
                class="border rounded-lg w-full py-3 px-4 text-gray-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
        </div>

        <div class="flex flex-col space-y-3 mb-6">
            <button id="joinRoomBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition-all active:scale-95">加入房间</button>
            <button id="leaveRoomBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg shadow-md transition-all hidden">离开房间</button>
        </div>

        <div class="bg-gray-50 p-4 rounded-xl mb-6 text-left text-sm border border-gray-100">
            <p class="mb-1"><strong>状态:</strong> <span id="statusMessage" class="text-indigo-600">等待操作...</span></p>
            <p class="text-gray-500"><strong>在线人数:</strong> <span id="roomUserCountValue">0</span></p>
            <div id="voiceConnectedStatus" class="text-green-600 font-bold mt-1 hidden">● 语音通话中</div>
        </div>

        <div id="audioControls" class="flex justify-center space-x-4 mb-6 hidden">
            <button id="toggleLocalMicBtn" class="py-2 px-4 rounded-full font-bold bg-green-500 text-white shadow-sm">麦克风: 开</button>
            <button id="toggleRemoteAudioBtn" class="py-2 px-4 rounded-full font-bold bg-purple-500 text-white shadow-sm">静音对方: 关</button>
        </div>

        <div id="textChatSection" class="hidden">
            <div id="messagesContainer" class="h-64 overflow-y-auto border rounded-lg p-3 mb-3 bg-gray-50 text-left scrollbar-thin">
                <p class="text-gray-400 text-center text-xs italic mt-20">暂无消息</p>
            </div>
            <div class="flex">
                <input type="text" id="newMessageInput" placeholder="输入内容..." class="flex-grow border rounded-l-lg px-3 outline-none" />
                <button id="sendMessageBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-r-lg">发送</button>
            </div>
        </div>

        <div id="remoteAudiosContainer" class="hidden"></div>
        <audio id="localAudio" class="hidden" autoplay muted></audio>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import * as firestore from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 请在此处替换为您自己的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAXlYCZr6F1Nunieg7CDeYM0O_6iX1AZq0",
            authDomain: "wuzi-1ecf3.firebaseapp.com",
            projectId: "wuzi-1ecf3",
            storageBucket: "wuzi-1ecf3.firebasestorage.app",
            messagingSenderId: "274766423411",
            appId: "1:274766423411:web:ef1549f49be22bf53b9106"
        };
        const appId = firebaseConfig.appId.replace(/:/g, '_'); 
        // ==========================================

        let db, auth, userId, localStream;
        let currentRoomId = '';
        let peerConnections = new Map();
        let isLocalMicMuted = false;
        let isRemoteAudioMuted = false;

        const statusMsg = document.getElementById('statusMessage');
        const userCountValue = document.getElementById('roomUserCountValue');

        // 初始化
        const app = initializeApp(firebaseConfig);
        db = firestore.getFirestore(app);
        auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if (user) {
                userId = user.uid;
                statusMsg.textContent = "已连接服务";
                document.getElementById('joinRoomBtn').disabled = false;
            } else {
                signInAnonymously(auth);
            }
        });

        // 获取麦克风（优化参数）
        async function getMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });
                localStream = stream;
                document.getElementById('localAudio').srcObject = stream;
                return stream;
            } catch (e) {
                console.error("无法获取麦克风:", e);
                statusMsg.textContent = "麦克风权限被拒绝";
                return null;
            }
        }

        // 创建 WebRTC 连接
        function createPC(remoteId, stream) {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
                iceCandidatePoolSize: 10
            });

            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            pc.ontrack = event => {
                let audio = document.getElementById(`audio-${remoteId}`);
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = `audio-${remoteId}`;
                    audio.autoplay = true;
                    document.getElementById('remoteAudiosContainer').appendChild(audio);
                }
                audio.srcObject = event.streams[0];
                // 解决电脑端自动播放限制的关键：
                audio.play().catch(() => {
                    statusMsg.textContent = "请点击页面开启声音";
                    window.addEventListener('click', () => audio.play(), { once: true });
                });
                document.getElementById('voiceConnectedStatus').classList.remove('hidden');
            };

            pc.onicecandidate = e => {
                if (e.candidate) {
                    firestore.addDoc(firestore.collection(db, `rooms/${currentRoomId}/signals/${remoteId}/candidates`), {
                        candidate: e.candidate.toJSON(),
                        sender: userId
                    });
                }
            };

            peerConnections.set(remoteId, pc);
            return pc;
        }

        // 加入房间
        async function joinRoom() {
            const rid = document.getElementById('roomIdInput').value;
            if (!rid) return alert("请输入房间ID");
            
            currentRoomId = rid;
            const stream = await getMedia();
            if (!stream) return;

            statusMsg.textContent = "正在加入...";
            
            // 1. 声明在线
            const presenceRef = firestore.doc(db, `rooms/${rid}/presences`, userId);
            await firestore.setDoc(presenceRef, { timestamp: Date.now() });

            // 2. 监听其他用户
            firestore.onSnapshot(firestore.collection(db, `rooms/${rid}/presences`), snap => {
                userCountValue.textContent = snap.size;
                snap.docChanges().forEach(async change => {
                    const rId = change.doc.id;
                    if (rId === userId) return;

                    if (change.type === 'added') {
                        // 约定：UID 小的负责发起 Offer
                        if (userId < rId) {
                            const pc = createPC(rId, stream);
                            const offer = await pc.createOffer();
                            await pc.setLocalDescription(offer);
                            await firestore.setDoc(firestore.doc(db, `rooms/${rid}/signals/${rId}/offers`, userId), {
                                sdp: offer.sdp,
                                type: offer.type
                            });
                        }
                    }
                });
            });

            // 3. 监听信令 (Offer/Answer/Candidate)
            listenSignaling(rid, stream);
            
            document.getElementById('joinRoomBtn').classList.add('hidden');
            document.getElementById('leaveRoomBtn').classList.remove('hidden');
            document.getElementById('audioControls').classList.remove('hidden');
            document.getElementById('textChatSection').classList.remove('hidden');
            statusMsg.textContent = "通话中";
        }

        function listenSignaling(rid, stream) {
            // 听 Offer
            firestore.onSnapshot(firestore.collection(db, `rooms/${rid}/signals/${userId}/offers`), snap => {
                snap.docChanges().forEach(async change => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        const pc = createPC(change.doc.id, stream);
                        await pc.setRemoteDescription(new RTCSessionDescription(data));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        await firestore.setDoc(firestore.doc(db, `rooms/${rid}/signals/${change.doc.id}/answers`, userId), {
                            sdp: answer.sdp,
                            type: answer.type
                        });
                    }
                });
            });

            // 听 Answer
            firestore.onSnapshot(firestore.collection(db, `rooms/${rid}/signals/${userId}/answers`), snap => {
                snap.docChanges().forEach(async change => {
                    if (change.type === 'added') {
                        const pc = peerConnections.get(change.doc.id);
                        if (pc && pc.signalingState !== 'stable') {
                            await pc.setRemoteDescription(new RTCSessionDescription(change.doc.data()));
                        }
                    }
                });
            });

            // 听 Candidate
            firestore.onSnapshot(firestore.collection(db, `rooms/${rid}/signals/${userId}/candidates`), snap => {
                snap.docChanges().forEach(async change => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        const pc = peerConnections.get(data.sender);
                        if (pc) await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    }
                });
            });
        }

        // 按钮事件绑定
        document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
        document.getElementById('leaveRoomBtn').addEventListener('click', () => location.reload());
        
        document.getElementById('toggleLocalMicBtn').addEventListener('click', () => {
            isLocalMicMuted = !isLocalMicMuted;
            localStream.getAudioTracks()[0].enabled = !isLocalMicMuted;
            document.getElementById('toggleLocalMicBtn').textContent = isLocalMicMuted ? "麦克风: 关" : "麦克风: 开";
            document.getElementById('toggleLocalMicBtn').classList.toggle('bg-red-500');
        });

        document.getElementById('toggleRemoteAudioBtn').addEventListener('click', () => {
            isRemoteAudioMuted = !isRemoteAudioMuted;
            document.querySelectorAll('#remoteAudiosContainer audio').forEach(a => a.muted = isRemoteAudioMuted);
            document.getElementById('toggleRemoteAudioBtn').textContent = isRemoteAudioMuted ? "静音对方: 开" : "静音对方: 关";
            document.getElementById('toggleRemoteAudioBtn').classList.toggle('bg-red-500');
        });

    </script>
</body>
</html>
